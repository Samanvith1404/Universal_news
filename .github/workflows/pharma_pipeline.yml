name: Daily Pharma Intel

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST
  workflow_dispatch:

jobs:
  run-pharma:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install aiohttp beautifulsoup4 python-dateutil certifi \
                      playwright requests python-dotenv

          playwright install chromium
          playwright install-deps chromium

      # 4. Run pipeline
      - name: Run Extraction Pipeline
        run: |
          cd News_portals
          python run_pipeline.py --query protac --days 7 --no-summarize

      # 5. Merge data
      - name: Merge Articles
        run: |
          cd News_portals
          python merge.py

      # 6. Count articles
      - name: Check article count
        id: check
        run: |
          python - <<'EOF'
          import json, os
          from pathlib import Path

          f = Path('News_portals/allinone.json')
          count = 0
          if f.exists():
              data = json.loads(f.read_text(encoding='utf-8'))
              count = len(data.get('articles', []))

          print(f'Articles: {count}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'count={count}\n')
          EOF

      # 7. Run summarizer
      - name: Run Summarizer
        if: steps.check.outputs.count != '0'
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          cd News_portals
          python SUMMARIZER.py \
            --input allinone.json \
            --query "protac" \
            --output brief_bispecific_antibodies.json

      # 8. Commit results
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add News_portals/brief_*.json News_portals/allinone.json

          git diff --staged --quiet || git commit -m "Pharma update $(date +'%Y-%m-%d')"

          git push
