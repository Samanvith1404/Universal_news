name: Daily Company Intel

on:
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST
  workflow_dispatch:

jobs:
  run-company:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install requests aiohttp beautifulsoup4 lxml playwright python-dotenv
          playwright install chromium
          playwright install-deps chromium

      # 4. Run pipeline
      - name: Run Harvester
        run: python companies_news/harvester.py

      - name: Run Delta Engine
        run: python companies_news/today_info.py

      # 5. Check new articles
      - name: Check if new articles exist
        id: check
        run: |
          COUNT=$(python -c "import json; d=json.load(open('companies_news/today.json')); print(len(d))")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "New articles: $COUNT"

      # 6. Run LLM
      - name: Run LLM extractor
        if: steps.check.outputs.count != '0'
        run: python companies_news/llm.py

      # 7. Run summarizer
      - name: Run Summary
        if: steps.check.outputs.count != '0'
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python companies_news/summary.py --query "gene editing"

      # 8. Commit results
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add companies_news/*.json

          git diff --staged --quiet || git commit -m "Company update $(date +'%Y-%m-%d')"

          git push
